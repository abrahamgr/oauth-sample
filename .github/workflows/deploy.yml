name: Deploy to Firebase

on:
  workflow_dispatch:
    inputs:
      services:
        description: "Services to deploy (comma-separated: db,app,idp,api)"
        required: false
        default: "db,app,idp,api"

jobs:
  migrate:
    name: DB Migrations (Neon)
    runs-on: ubuntu-latest
    if: contains(github.event.inputs.services, 'db')
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Run Drizzle migrations
        run: bun run db:migrate
        working-directory: packages/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-app:
    name: Deploy app → Firebase Hosting
    runs-on: ubuntu-latest
    needs: migrate
    if: always() && !failure() && !cancelled() && contains(github.event.inputs.services, 'app')
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build app
        run: bun run build
        working-directory: packages/app
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_CLIENT_ID: ${{ secrets.VITE_CLIENT_ID }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install -g firebase-tools
      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }}

  deploy-idp:
    name: Deploy idp → Firebase App Hosting
    runs-on: ubuntu-latest
    needs: migrate
    if: always() && !failure() && !cancelled() && contains(github.event.inputs.services, 'idp')
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install -g firebase-tools
      - name: Deploy idp to App Hosting
        run: firebase deploy --only apphosting:${{ secrets.FIREBASE_IDP_BACKEND_ID }} --project ${{ secrets.FIREBASE_PROJECT_ID }}

  deploy-api:
    name: Deploy api → Firebase App Hosting
    runs-on: ubuntu-latest
    needs: migrate
    if: always() && !failure() && !cancelled() && contains(github.event.inputs.services, 'api')
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install -g firebase-tools
      - name: Deploy api to App Hosting
        run: firebase deploy --only apphosting:${{ secrets.FIREBASE_API_BACKEND_ID }} --project ${{ secrets.FIREBASE_PROJECT_ID }}
