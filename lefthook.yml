pre-commit:
  parallel: true
  jobs:
    - name: biome
      run: bun run check -- --unsafe --no-errors-on-unmatched {staged_files}
      glob: '*.{css,js,jsx,ts,tsx,md,yml,json}'
      stage_fixed: true
