    value: pnpm
    availability:
      - BUILD
      - RUNTIME
  - variable: API_URL
    secret: API_URL
  - variable: ALLOWED_ORIGINS
    value: https://oauth-sample-7fe4b.web.app
  - variable: INTERNAL_SECRET
    secret: INTERNAL_SECRET
  - variable: SESSION_SECRET
    secret: SESSION_SECRET
  - variable: VITE_FIREBASE_API_KEY
    value: AIzaSyBaAGvdlpkyRjOg5u8275QfyzDLBXynyrs
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_APP_ID
    value: 1:656193020054:web:7956688e06ab10a626e2b7
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_PROJECT_ID
    value: oauth-sample-7fe4b
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_FIREBASE_STORAGE_BUCKET
