scripts:
  runCommand: node ./node_modules/@react-router/serve/bin.js ./apps/idp/build/server/index.js

runConfig:
  runtime: nodejs24
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10

env:
