runConfig:
  runtime: nodejs24
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10

scripts:
  buildCommand: pnpm --filter idp run build
  runCommand: pnpm --filter idp run start

env:
  - variable: API_URL
    secret: API_URL
  - variable: INTERNAL_SECRET
    secret: INTERNAL_SECRET
  - variable: SESSION_SECRET
    secret: SESSION_SECRET
